  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

y { direction: rtl; font-family: 'Cairo', sans-serif; background: #F7F9F7; color: #111C32; }\n    a { text-decoration: none; color: inherit; }\n    button { font-family: 'Cairo', sans-serif; }\n    input, textarea, select { font-family: 'Cairo', sans-serif; }\n\n    @keyframes fadeUp {\n      from { opacity: 0; transform: translateY(32px); }\n      to   { opacity: 1; transform: translateY(0); }\n    }\n    @keyframes heroIn {\n      from { opacity: 0; transform: translateY(24px); }\n      to   { opacity: 1; transform: translateY(0); }\n    }\n    @keyframes floatY {\n      0%, 100% { transform: translateY(0px); }\n      50%       { transform: translateY(-10px); }\n    }\n\n    .hero-animate { animation: heroIn 0.9s cubic-bezier(.22,.68,0,1.2) both; }\n    .hero-animate-delay { animation: heroIn 0.9s 0.2s cubic-bezier(.22,.68,0,1.2) both; }\n    .hero-animate-delay2 { animation: heroIn 0.9s 0.4s cubic-bezier(.22,.68,0,1.2) both; }\n    .float-card { animation: floatY 4s ease-in-out infinite; }\n    .float-card-2 { animation: floatY 4s 1.3s ease-in-out infinite; }\n    .float-card-3 { animation: floatY 4s 2.6s ease-in-out infinite; }\n\n    @media (max-width: 1024px) {\n      .desktop-nav { display: none !important; }\n      .hamburger   { display: flex !important; }\n      .hero-cards  { display: none !important; }\n      .hero-inner  { flex-direction: column !important; text-align: center; justify-content: center; }\n      .hero-btns   { justify-content: center !important; }\n    }\n    @media (max-width: 860px) {\n      .about-cols   { flex-direction: column !important; }\n      .contact-cols { flex-direction: column !important; }\n      .footer-cols  { flex-wrap: wrap !important; gap: 32px !important; }\n    }\n    @media (max-width: 768px) {\n      .stats-grid    { grid-template-columns: 1fr 1fr !important; }\n      .projects-grid { grid-template-columns: 1fr 1fr !important; gap: 16px !important; }\n      .gov-grid      { grid-template-columns: 1fr !important; }\n      .donate-grid   { grid-template-columns: 1fr 1fr !important; gap: 16px !important; }\n      .section-title { font-size: 26px !important; }\n      .hero-title    { font-size: 38px !important; line-height: 1.2 !important; }\n      .donate-grid   { grid-template-columns: 1fr 1fr !important; }\n    }\n    @media (max-width: 520px) {\n      .stats-grid    { grid-template-columns: 1fr 1fr !important; }\n      .projects-grid { grid-template-columns: 1fr !important; }\n      .donate-grid   { grid-template-columns: 1fr !important; }\n      .hero-title    { font-size: 32px !important; }\n      .footer-cols   { flex-direction: column !important; }\n    }\n\n    ::-webkit-scrollbar { width: 4px; }\n    ::-webkit-scrollbar-thumb { background: #4E5F80; border-radius: 4px; }\n    ::-webkit-scrollbar-track { background: #f0f0f0; }\n  <\u002Fstyle>\n<\u002Fhelmet>\n\n<!-- ═══════════════════════════════════════════════ NAVBAR -->\n<nav style=\"position:fixed;top:0;right:0;left:0;z-index:1000;transition:background 0.35s,box-shadow 0.35s;background:{{navBg}};box-shadow:{{navShadow}}\">\n  <div style=\"max-width:1280px;margin:0 auto;padding:0 28px;display:flex;align-items:center;justify-content:space-between;height:70px\">\n\n    <!-- Logo -->\n    <a href=\"#home\" style=\"display:flex;align-items:center;gap:12px\">\n      <img src=\"5a319387-ae51-4a9b-a5b2-8c218b175819\" alt=\"عناية بالمصاحف بالأحساء\" style=\"height:42px;object-fit:contain;display:block\">\n    <\u002Fa>\n\n    <!-- Desktop Nav -->\n    <div class=\"desktop-nav\" style=\"display:flex;align-items:center;gap:2px\">\n      <a href=\"#home\" style=\"padding:8px 14px;font-size:14px;font-weight:600;color:{{navTextColor}};border-radius:8px;transition:all 0.2s;white-space:nowrap\" style-hover=\"background:rgba(28,94,56,0.1)\">الرئيسية<\u002Fa>\n      <a href=\"#about\" style=\"padding:8px 14px;font-size:14px;font-weight:600;color:{{navTextColor}};border-radius:8px;transition:all 0.2s;white-space:nowrap\" style-hover=\"background:rgba(28,94,56,0.1)\">عن الجمعية<\u002Fa>\n      <a href=\"#projects\" style=\"padding:8px 14px;font-size:14px;font-weight:600;color:{{navTextColor}};border-radius:8px;transition:all 0.2s;white-space:nowrap\" style-hover=\"background:rgba(28,94,56,0.1)\">مشاريعنا<\u002Fa>\n      <a href=\"#governance\" style=\"padding:8px 14px;font-size:14px;font-weight:600;color:{{navTextColor}};border-radius:8px;transition:all 0.2s;white-space:nowrap\" style-hover=\"background:rgba(28,94,56,0.1)\">الحوكمة<\u002Fa>\n      <a href=\"#request-mushaf\" style=\"padding:8px 14px;font-size:14px;font-weight:600;color:{{navTextColor}};border-radius:8px;transition:all 0.2s;white-space:nowrap\" style-hover=\"background:rgba(78,95,128,0.1)\">اطلب مصحفاً<\u002Fa>\n      <a href=\"#contact\" style=\"padding:8px 14px;font-size:14px;font-weight:600;color:{{navTextColor}};border-radius:8px;transition:all 0.2s;white-space:nowrap\" style-hover=\"background:rgba(28,94,56,0.1)\">اتصل بنا<\u002Fa>\n      <a href=\"#donate\" style=\"margin-right:8px;padding:10px 22px;background:#C4A882;color:#fff;font-size:14px;font-weight:700;border-radius:10px;transition:all 0.2s;white-space:nowrap;box-shadow:0 2px 12px rgba(196,168,130,0.35)\" style-hover=\"background:#A8906E;transform:translateY(-1px)\">تبرع الآن<\u002Fa>\n    <\u002Fdiv>\n\n    <!-- Hamburger -->\n    <button class=\"hamburger\" onclick=\"{{toggleMobileMenu}}\" style=\"display:none;flex-direction:column;gap:5px;background:none;border:none;cursor:pointer;padding:8px;border-radius:8px\" style-hover=\"background:rgba(28,94,56,0.08)\">\n      <span style=\"width:22px;height:2px;background:{{navTextColor}};border-radius:1px;display:block;transition:all 0.3s\"><\u002Fspan>\n      <span style=\"width:22px;height:2px;background:{{navTextColor}};border-radius:1px;display:block;transition:all 0.3s\"><\u002Fspan>\n      <span style=\"width:22px;height:2px;background:{{navTextColor}};border-radius:1px;display:block;transition:all 0.3s\"><\u002Fspan>\n    <\u002Fbutton>\n  <\u002Fdiv>\n\n  <!-- Mobile Menu -->\n  <div style=\"display:{{mobileMenuDisplay}};flex-direction:column;background:#fff;border-top:1px solid #D8E0F0;padding:12px 28px 20px;gap:2px;box-shadow:0 12px 32px rgba(0,0,0,0.1)\">\n    <a href=\"#home\" onclick=\"{{toggleMobileMenu}}\" style=\"padding:13px 16px;font-size:15px;font-weight:600;color:#4E5F80;border-radius:10px\" style-hover=\"background:#E5EAF5\">الرئيسية<\u002Fa>\n    <a href=\"#about\" onclick=\"{{toggleMobileMenu}}\" style=\"padding:13px 16px;font-size:15px;font-weight:600;color:#4E5F80;border-radius:10px\" style-hover=\"background:#E5EAF5\">عن الجمعية<\u002Fa>\n    <a href=\"#projects\" onclick=\"{{toggleMobileMenu}}\" style=\"padding:13px 16px;font-size:15px;font-weight:600;color:#4E5F80;border-radius:10px\" style-hover=\"background:#E5EAF5\">مشاريعنا<\u002Fa>\n    <a href=\"#governance\" onclick=\"{{toggleMobileMenu}}\" style=\"padding:13px 16px;font-size:15px;font-weight:600;color:#4E5F80;border-radius:10px\" style-hover=\"background:#E5EAF5\">الحوكمة والشفافية<\u002Fa>\n    <a href=\"#donate\" onclick=\"{{toggleMobileMenu}}\" style=\"padding:13px 16px;font-size:15px;font-weight:800;color:#C4A882;border-radius:10px\" style-hover=\"background:#FAF6EF\">تبرع الآن<\u002Fa>\n    <a href=\"#request-mushaf\" onclick=\"{{toggleMobileMenu}}\" style=\"padding:13px 16px;font-size:15px;font-weight:600;color:#4E5F80;border-radius:10px\" style-hover=\"background:#E5EAF5\">اطلب مصحفاً<\u002Fa>\n    <a href=\"#contact\" onclick=\"{{toggleMobileMenu}}\" style=\"padding:13px 16px;font-size:15px;font-weight:600;color:#4E5F80;border-radius:10px\" style-hover=\"background:#E5EAF5\">اتصل بنا<\u002Fa>\n  <\u002Fdiv>\n<\u002Fnav>\n\n<!-- ═══════════════════════════════════════════════ HERO -->\n<section id=\"home\" style=\"min-height:100vh;background:linear-gradient(155deg,#4E5F80 0%,#5A6F9E 50%,#6278A8 100%);position:relative;overflow:hidden;display:flex;align-items:center;padding:70px 28px 60px\">\n\n  <!-- Background grid pattern -->\n  <div style=\"position:absolute;inset:0;opacity:0.04\">\n    <svg width=\"100%\" height=\"100%\" xmlns=\"http://www.w3.org/2000/svg\">\n      <defs>\n        <pattern id=\"grid\" width=\"64\" height=\"64\" patternUnits=\"userSpaceOnUse\">\n          <path d=\"M 64 0 L 0 0 0 64\" fill=\"none\" stroke=\"white\" stroke-width=\"0.8\"><\u002Fpath>\n          <circle cx=\"0\" cy=\"0\" r=\"2\" fill=\"white\"><\u002Fcircle>\n        <\u002Fpattern>\n      <\u002Fdefs>\n      <rect width=\"100%\" height=\"100%\" fill=\"url(#grid)\"><\u002Frect>\n    <\u002Fsvg>\n  <\u002Fdiv>\n\n  <!-- Decorative blobs -->\n  <div style=\"position:absolute;bottom:-120px;left:-120px;width:480px;height:480px;background:radial-gradient(circle,rgba(196,168,130,0.12) 0%,transparent 70%);pointer-events:none\"><\u002Fdiv>\n  <div style=\"position:absolute;top:-60px;right:3%;width:320px;height:320px;background:radial-gradient(circle,rgba(255,255,255,0.05) 0%,transparent 70%);pointer-events:none\"><\u002Fdiv>\n\n  <div class=\"hero-inner\" style=\"max-width:1280px;margin:0 auto;width:100%;display:flex;align-items:center;justify-content:space-between;gap:48px\">\n\n    <!-- Text Block -->\n    <div style=\"flex:1;min-width:300px;max-width:620px\">\n      <div class=\"hero-animate\" style=\"display:inline-flex;align-items:center;gap:10px;background:rgba(196,168,130,0.15);border:1px solid rgba(196,168,130,0.35);border-radius:100px;padding:8px 20px;margin-bottom:28px\">\n        <div style=\"width:7px;height:7px;background:#C4A882;border-radius:50%\"><\u002Fdiv>\n        <span style=\"font-size:13px;font-weight:700;color:#C4A882;letter-spacing:0.5px\">رعاية كتاب الله<\u002Fspan>\n      <\u002Fdiv>\n\n      <h1 class=\"hero-animate hero-title\" style=\"font-size:62px;font-weight:900;color:#FFFFFF;line-height:1.1;margin-bottom:24px\">\n        نحافظ على<br>\n        <span style=\"color:#C4A882\">كتاب الله<\u002Fspan>\n      <\u002Fh1>\n\n      <p class=\"hero-animate-delay\" style=\"font-size:18px;color:rgba(255,255,255,0.82);line-height:1.9;max-width:520px;margin-bottom:40px\">\n        جمعية عناية بالمصاحف بالأحساء — تجمع المصاحف المستعملة وترممها وتوزعها، بمنظومة رقمية شفافة تربط المتبرعين بالمستفيدين\n      <\u002Fp>\n\n      <div class=\"hero-btns hero-animate-delay2\" style=\"display:flex;gap:16px;flex-wrap:wrap\">\n        <a href=\"#donate\" style=\"padding:15px 38px;background:#C4A882;color:#fff;font-size:16px;font-weight:700;border-radius:12px;transition:all 0.3s;box-shadow:0 4px 24px rgba(196,168,130,0.4)\" style-hover=\"background:#A8906E;transform:translateY(-2px);box-shadow:0 8px 32px rgba(196,168,130,0.5)\">تبرع الآن<\u002Fa>\n        <a href=\"#about\" style=\"padding:15px 34px;background:transparent;border:2px solid rgba(255,255,255,0.35);color:#fff;font-size:16px;font-weight:700;border-radius:12px;transition:all 0.3s\" style-hover=\"background:rgba(255,255,255,0.1);transform:translateY(-2px)\">تعرف علينا<\u002Fa>\n        <button onclick=\"{{ openBenefModal }}\" style=\"padding:15px 34px;background:transparent;border:2px solid rgba(255,255,255,0.35);color:#fff;font-size:16px;font-weight:700;border-radius:12px;transition:all 0.3s;cursor:pointer\" style-hover=\"background:rgba(255,255,255,0.1);transform:translateY(-2px)\">اطلب مصحفاً<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Floating Cards -->\n    <div class=\"hero-cards\" style=\"flex:0 0 auto;display:flex;flex-direction:column;gap:16px;align-items:flex-start\">\n      <div class=\"float-card\" style=\"background:rgba(255,255,255,0.08);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.15);border-radius:20px;padding:24px 32px;min-width:190px;text-align:center\">\n        <div style=\"font-size:40px;font-weight:900;color:#C4A882;line-height:1\">+500<\u002Fdiv>\n        <div style=\"font-size:13px;color:rgba(255,255,255,0.8);font-weight:600;margin-top:6px\">مصحف شهرياً<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"float-card-2\" style=\"background:rgba(255,255,255,0.08);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.15);border-radius:20px;padding:24px 32px;min-width:190px;text-align:center\">\n        <div style=\"font-size:40px;font-weight:900;color:#FFFFFF;line-height:1\">100%<\u002Fdiv>\n        <div style=\"font-size:13px;color:rgba(255,255,255,0.8);font-weight:600;margin-top:6px\">شفافية في التبرعات<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"float-card-3\" style=\"background:rgba(196,168,130,0.18);backdrop-filter:blur(12px);border:1px solid rgba(196,168,130,0.35);border-radius:20px;padding:24px 32px;min-width:190px;text-align:center\">\n        <div style=\"font-size:40px;font-weight:900;color:#C4A882;line-height:1\">4.5 ★<\u002Fdiv>\n        <div style=\"font-size:13px;color:rgba(255,255,255,0.8);font-weight:600;margin-top:6px\">تقييم التطبيق<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ═══════════════════════════════════════════════ STATS -->\n<section id=\"stats-section\" style=\"background:linear-gradient(90deg,#4E5F80,#6278A8);padding:72px 28px\">\n  <div style=\"max-width:1280px;margin:0 auto\">\n    <div class=\"stats-grid\" style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:0\">\n      <sc-for list=\"{{ stats }}\" as=\"stat\" hint-placeholder-count=\"4\">\n        <div style=\"text-align:center;padding:24px 16px;border-left:1px solid rgba(255,255,255,0.12)\">\n          <div data-count-target=\"{{ stat.target }}\" data-count-prefix=\"{{ stat.prefix }}\" data-count-suffix=\"{{ stat.suffix }}\" data-count-decimal=\"{{ stat.isDecimal }}\" style=\"font-size:52px;font-weight:900;color:#C4A882;line-height:1;margin-bottom:10px\">{{ stat.display }}<\u002Fdiv>\n          <div style=\"font-size:17px;font-weight:700;color:#FFFFFF;margin-bottom:4px\">{{ stat.label }}<\u002Fdiv>\n          <div style=\"font-size:13px;color:rgba(255,255,255,0.65)\">{{ stat.sub }}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ═══════════════════════════════════════════════ ABOUT -->\n<section id=\"about\" style=\"padding:96px 28px;background:#FFFFFF\">\n  <div style=\"max-width:1280px;margin:0 auto\">\n\n    <div class=\"reveal\" style=\"text-align:center;margin-bottom:64px\">\n      <div style=\"display:inline-flex;align-items:center;gap:8px;background:#E5EAF3;border-radius:100px;padding:7px 18px;margin-bottom:16px\">\n        <span style=\"font-size:13px;font-weight:700;color:#4E5F80\">من نحن<\u002Fspan>\n      <\u002Fdiv>\n      <h2 class=\"section-title\" style=\"font-size:38px;font-weight:900;color:#111C32;margin-bottom:14px\">التعريف بالجمعية<\u002Fh2>\n      <p style=\"font-size:17px;color:#536080;max-width:560px;margin:0 auto;line-height:1.85\">جمعية خيرية متخصصة في رعاية المصحف الشريف وضمان احترامه والمحافظة على كرامته<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"about-cols\" style=\"display:flex;gap:28px;align-items:stretch;flex-wrap:wrap\">\n\n      <!-- Vision -->\n      <div class=\"reveal\" style=\"flex:1;min-width:260px;background:#fff;border-radius:20px;padding:36px;box-shadow:0 2px 20px rgba(28,94,56,0.06);border:1px solid #D8E0F0\">\n        <div style=\"width:52px;height:52px;background:linear-gradient(135deg,#4E5F80,#5A6F9E);border-radius:14px;display:flex;align-items:center;justify-content:center;margin-bottom:22px\">\n          <svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#C4A882\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z\"><\u002Fpath><circle cx=\"12\" cy=\"12\" r=\"3\"><\u002Fcircle><\u002Fsvg>\n        <\u002Fdiv>\n        <h3 style=\"font-size:22px;font-weight:800;color:#111C32;margin-bottom:14px\">رؤيتنا<\u002Fh3>\n        <p style=\"font-size:15px;color:#4A5B7A;line-height:1.9\">أن نكون المرجع الأول في رعاية المصاحف وصون كرامتها في الأحساء والمنطقة الشرقية، عبر منظومة رقمية متكاملة تحقق شفافية تامة وتصل لأوسع شريحة من المتبرعين والمستفيدين.<\u002Fp>\n      <\u002Fdiv>\n\n      <!-- Mission -->\n      <div class=\"reveal\" style=\"flex:1;min-width:260px;background:#fff;border-radius:20px;padding:36px;box-shadow:0 2px 20px rgba(28,94,56,0.06);border:1px solid #D8E0F0\">\n        <div style=\"width:52px;height:52px;background:linear-gradient(135deg,#C4A882,#D4BB96);border-radius:14px;display:flex;align-items:center;justify-content:center;margin-bottom:22px\">\n          <svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#4E5F80\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M22 11.08V12a10 10 0 1 1-5.93-9.14\"><\u002Fpath><polyline points=\"22 4 12 14.01 9 11.01\"><\u002Fpolyline><\u002Fsvg>\n        <\u002Fdiv>\n        <h3 style=\"font-size:22px;font-weight:800;color:#111C32;margin-bottom:14px\">رسالتنا<\u002Fh3>\n        <p style=\"font-size:15px;color:#4A5B7A;line-height:1.9\">جمع المصاحف المستعملة والتالفة وإصلاحها في ورشة متخصصة، وإعادة توزيعها على المساجد والمستفيدين، مع توفير منصة رقمية تربط المتبرع بالمسار الكامل لتبرعه.<\u002Fp>\n      <\u002Fdiv>\n\n      <!-- Values -->\n      <div class=\"reveal\" style=\"flex:1;min-width:260px;background:linear-gradient(155deg,#5A6F9E,#4E5F80);border-radius:20px;padding:36px;box-shadow:0 4px 24px rgba(28,94,56,0.18)\">\n        <div style=\"width:52px;height:52px;background:rgba(196,168,130,0.18);border:2px solid rgba(196,168,130,0.4);border-radius:14px;display:flex;align-items:center;justify-content:center;margin-bottom:22px\">\n          <svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#C4A882\" stroke-width=\"2\" stroke-linecap=\"round\"><polygon points=\"12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2\"><\u002Fpolygon><\u002Fsvg>\n        <\u002Fdiv>\n        <h3 style=\"font-size:22px;font-weight:800;color:#FFFFFF;margin-bottom:20px\">قيمنا<\u002Fh3>\n        <div style=\"display:flex;flex-direction:column;gap:13px\">\n          <div style=\"display:flex;align-items:center;gap:12px\">\n            <div style=\"width:7px;height:7px;background:#C4A882;border-radius:50%;flex-shrink:0\"><\u002Fdiv>\n            <span style=\"font-size:14px;color:rgba(255,255,255,0.88)\">الأمانة والشفافية الكاملة<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:12px\">\n            <div style=\"width:7px;height:7px;background:#C4A882;border-radius:50%;flex-shrink:0\"><\u002Fdiv>\n            <span style=\"font-size:14px;color:rgba(255,255,255,0.88)\">احترام كرامة المصحف الشريف<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:12px\">\n            <div style=\"width:7px;height:7px;background:#C4A882;border-radius:50%;flex-shrink:0\"><\u002Fdiv>\n            <span style=\"font-size:14px;color:rgba(255,255,255,0.88)\">الكفاءة في توزيع الموارد<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:12px\">\n            <div style=\"width:7px;height:7px;background:#C4A882;border-radius:50%;flex-shrink:0\"><\u002Fdiv>\n            <span style=\"font-size:14px;color:rgba(255,255,255,0.88)\">خدمة المجتمع بإخلاص<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:12px\">\n            <div style=\"width:7px;height:7px;background:#C4A882;border-radius:50%;flex-shrink:0\"><\u002Fdiv>\n            <span style=\"font-size:14px;color:rgba(255,255,255,0.88)\">الابتكار الرقمي لخدمة الخير<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n\n    <!-- Board of Directors -->\n    <div class=\"reveal\" style=\"margin-top:60px\">\n      <h3 style=\"font-size:26px;font-weight:800;color:#111C32;margin-bottom:36px;text-align:center\">مجلس الإدارة والقيادة<\u002Fh3>\n      <!-- الرئيس ونائب الرئيس -->\n      <div style=\"display:flex;gap:20px;justify-content:center;flex-wrap:wrap;margin-bottom:20px\">\n        <sc-for list=\"{{ boardLeaders }}\" as=\"member\" hint-placeholder-count=\"2\">\n          <div style=\"background:linear-gradient(135deg,#4E5F80,#3A4D6E);border-radius:18px;padding:28px 52px;box-shadow:0 4px 24px rgba(78,95,128,0.22);text-align:center;min-width:220px;transition:all 0.3s\" style-hover=\"transform:translateY(-4px);box-shadow:0 10px 32px rgba(78,95,128,0.32)\">\n            <div style=\"font-size:16px;font-weight:800;color:#FFFFFF;margin-bottom:6px\">{{ member.role }}<\u002Fdiv>\n            <div style=\"font-size:13px;color:#C4A882;font-weight:600\">{{ member.dept }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <!-- بقية الأعضاء -->\n      <div style=\"display:flex;gap:16px;justify-content:center;flex-wrap:wrap\">\n        <sc-for list=\"{{ boardMembers }}\" as=\"member\" hint-placeholder-count=\"6\">\n          <div style=\"background:#fff;border-radius:16px;padding:22px 28px;box-shadow:0 2px 14px rgba(78,95,128,0.07);border:1px solid #D8E0F0;text-align:center;min-width:150px;transition:all 0.3s\" style-hover=\"transform:translateY(-3px);box-shadow:0 6px 22px rgba(78,95,128,0.12)\">\n            <div style=\"font-size:14px;font-weight:700;color:#111C32;margin-bottom:4px\">{{ member.role }}<\u002Fdiv>\n            <div style=\"font-size:12px;color:#5A6B8E\">{{ member.dept }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ═══════════════════════════════════════════════ PROJECTS -->\n<section id=\"projects\" style=\"padding:96px 28px;background:#F0F2F5\">\n  <div style=\"max-width:1280px;margin:0 auto\">\n\n    <div class=\"reveal\" style=\"text-align:center;margin-bottom:60px\">\n      <div style=\"display:inline-flex;align-items:center;gap:8px;background:#D5DCF0;border-radius:100px;padding:7px 18px;margin-bottom:16px\">\n        <span style=\"font-size:13px;font-weight:700;color:#4E5F80\">ما نقوم به<\u002Fspan>\n      <\u002Fdiv>\n      <h2 class=\"section-title\" style=\"font-size:38px;font-weight:900;color:#111C32;margin-bottom:14px\">مشاريع الجمعية الستة<\u002Fh2>\n      <p style=\"font-size:17px;color:#536080;max-width:520px;margin:0 auto;line-height:1.85\">منظومة متكاملة تغطي دورة حياة المصحف من الجمع والترميم وصولاً إلى التوزيع<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"projects-grid reveal\" style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:24px\">\n      <sc-for list=\"{{ projects }}\" as=\"project\" hint-placeholder-count=\"6\">\n        <div style=\"background:#FFFFFF;border-radius:20px;padding:36px;box-shadow:0 2px 18px rgba(28,94,56,0.05);border:1px solid #D8E0F0;transition:all 0.3s;cursor:default\" style-hover=\"transform:translateY(-6px);box-shadow:0 14px 40px rgba(28,94,56,0.12);border-color:#C8D2EC\">\n          <div style=\"width:54px;height:54px;background:{{ project.iconBg }};border-radius:14px;display:flex;align-items:center;justify-content:center;margin-bottom:22px\">\n            <span style=\"font-size:22px;font-weight:900;color:{{ project.iconText }}\">{{ project.letter }}<\u002Fspan>\n          <\u002Fdiv>\n          <span style=\"display:inline-block;background:#E5EAF3;border-radius:100px;padding:4px 12px;font-size:11px;font-weight:700;color:#4E5F80;margin-bottom:14px\">مشروع {{ project.num }}<\u002Fspan>\n          <h3 style=\"font-size:19px;font-weight:800;color:#111C32;margin-bottom:11px;line-height:1.3\">{{ project.title }}<\u002Fh3>\n          <p style=\"font-size:14px;color:#536080;line-height:1.85\">{{ project.desc }}<\u002Fp>\n          <div style=\"margin-top:20px;display:flex;align-items:center;gap:7px;color:#4E5F80;font-size:14px;font-weight:700;transition:gap 0.2s;cursor:pointer\" style-hover=\"gap:11px\">\n            <span>اقرأ المزيد<\u002Fspan>\n            <svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\" stroke-linecap=\"round\"><line x1=\"5\" y1=\"12\" x2=\"19\" y2=\"12\"><\u002Fline><polyline points=\"12 5 19 12 12 19\"><\u002Fpolyline><\u002Fsvg>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ═══════════════════════════════════════════════ GOVERNANCE -->\n<section id=\"governance\" style=\"padding:96px 28px;background:#FFFFFF\">\n  <div style=\"max-width:1280px;margin:0 auto\">\n\n    <div style=\"display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:60px;flex-wrap:wrap;gap:28px\">\n      <div class=\"reveal\">\n        <div style=\"display:inline-flex;align-items:center;gap:8px;background:#E5EAF3;border-radius:100px;padding:7px 18px;margin-bottom:16px\">\n          <span style=\"font-size:13px;font-weight:700;color:#4E5F80\">الشفافية والمساءلة<\u002Fspan>\n        <\u002Fdiv>\n        <h2 class=\"section-title\" style=\"font-size:38px;font-weight:900;color:#111C32;margin-bottom:12px\">الحوكمة والشفافية<\u002Fh2>\n        <p style=\"font-size:16px;color:#536080;max-width:480px;line-height:1.85\">التزامنا الكامل بالإفصاح عن جميع الوثائق والتقارير والقرارات<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"reveal\" style=\"background:linear-gradient(135deg,#4E5F80,#5A6F9E);border-radius:18px;padding:26px 34px;text-align:center;min-width:180px\">\n        <div style=\"font-size:12px;color:rgba(255,255,255,0.75);font-weight:600;margin-bottom:8px;letter-spacing:0.5px\">العنوان الوطني<\u002Fdiv>\n        <div style=\"font-size:22px;font-weight:900;color:#C4A882;direction:ltr\">FHGD4325<\u002Fdiv>\n        <div style=\"font-size:11px;color:rgba(255,255,255,0.65);margin-top:5px\">الأحساء، المنطقة الشرقية<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"gov-grid reveal\" style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:20px\">\n      <sc-for list=\"{{ govDocs }}\" as=\"doc\" hint-placeholder-count=\"6\">\n        <div style=\"background:#fff;border-radius:16px;padding:26px;box-shadow:0 2px 14px rgba(28,94,56,0.05);border:1px solid #D8E0F0;display:flex;gap:18px;align-items:flex-start;transition:all 0.3s;cursor:pointer\" style-hover=\"border-color:#4E5F80;box-shadow:0 8px 28px rgba(28,94,56,0.1);transform:translateY(-3px)\">\n          <div style=\"width:46px;height:46px;background:#E5EAF3;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0\">\n            <svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#4E5F80\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z\"><\u002Fpath><polyline points=\"14 2 14 8 20 8\"><\u002Fpolyline><line x1=\"16\" y1=\"13\" x2=\"8\" y2=\"13\"><\u002Fline><line x1=\"16\" y1=\"17\" x2=\"8\" y2=\"17\"><\u002Fline><\u002Fsvg>\n          <\u002Fdiv>\n          <div style=\"flex:1;min-width:0\">\n            <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:7px;gap:8px\">\n              <h4 style=\"font-size:15px;font-weight:800;color:#111C32\">{{ doc.title }}<\u002Fh4>\n              <span style=\"font-size:10px;font-weight:700;background:#E5EAF3;color:#4E5F80;padding:2px 9px;border-radius:100px;white-space:nowrap;flex-shrink:0\">PDF<\u002Fspan>\n            <\u002Fdiv>\n            <p style=\"font-size:13px;color:#5A6B8E;line-height:1.7;margin-bottom:12px\">{{ doc.desc }}<\u002Fp>\n            <div style=\"display:flex;align-items:center;gap:6px;color:#4E5F80;font-size:13px;font-weight:700;transition:gap 0.2s\" style-hover=\"gap:10px\">\n              <span>تحميل الوثيقة<\u002Fspan>\n              <svg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\" stroke-linecap=\"round\"><path d=\"M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4\"><\u002Fpath><polyline points=\"7 10 12 15 17 10\"><\u002Fpolyline><line x1=\"12\" y1=\"15\" x2=\"12\" y2=\"3\"><\u002Fl s\" style-hover=\"color:#C4A882\">اتصل بنا<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n<\u002Ffooter>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = {\n    mobileMenuOpen: false,\n    navScrolled: false,\n    countersAnimated: false,\n  };\n\n  stats = [\n    { target: 50000, prefix: '+', suffix: '', label: 'مصحف وُزِّع', sub: 'منذ تأسيس الجمعية', display: '+50,000', isDecimal: false },\n    { target: 10000, prefix: '+', suffix: '', label: 'مستفيد سنوياً', sub: 'من الأفراد والمؤسسات', display: '+10,000', isDecimal: false },\n    { target: 100,   prefix: '', suffix: '%', label: 'شفافية كاملة', sub: 'في التبرعات والمصروفات', display: '100%', isDecimal: false },\n    { target: 45,    prefix: '', suffix: '★', label: 'تقييم التطبيق', sub: 'على iOS وAndroid', display: '4.5★', isDecimal: true },\n  ];\n\n  projects = [\n    { letter: 'ج', iconBg: '#4E5F80', iconText: '#C4A882', num: '١', title: 'جمع المصاحف', desc: 'نستقبل المصاحف المستعملة من المساجد والأفراد لتأهيلها وإعادة استخدامها بصورة لائقة بكلام الله تعالى' },\n    { letter: 'ت', iconBg: '#C4A882', iconText: '#4E5F80', num: '٢', title: 'الترميم والإصلاح', desc: 'ورشة متخصصة لترميم المصاحف التالفة وإصلاحها لتعود صالحةً للاستخدام بعد معالجة احترافية دقيقة' },\n    { letter: 'م', iconBg: '#4E5F80', iconText: '#C4A882', num: '٣', title: 'توزيع للمساجد', desc: 'توزيع المصاحف المجددة على المساجد والمصليات في الأحساء والمناطق المجاورة بشكل منظم ومتابع' },\n    { letter: 'خ', iconBg: '#C4A882', iconText: '#4E5F80', num: '٤', title: 'خدمة المستفيدين', desc: 'توفير المصاحف للأفراد والمؤسسات التعليمية والخيرية وفق معايير واضحة ومتابعة إلكترونية شفافة' },\n    { letter: 'و', iconBg: '#4E5F80', iconText: '#C4A882', num: '٥', title: 'التوعية والتثقيف', desc: 'نشر الوعي بآداب التعامل مع المصحف الشريف وأحكام صيانته والمحافظة عليه في أوساط المجتمع' },\n    { letter: 'ر', iconBg: '#C4A882', iconText: '#4E5F80', num: '٦', title: 'الرقمنة والشفافية', desc: 'منظومة رقمية متكاملة لتتبع كل مصحف من الاستلام حتى التوزيع بشفافية تامة وإشعارات فورية' },\n  ];\n\n  govDocs = [\n    { title: 'اللائحة الأساسية', desc: 'الوثيقة التأسيسية للجمعية وأهدافها وآليات عملها المعتمدة' },\n    { title: 'التقارير المالية', desc: 'القوائم المالية السنوية المعتمدة من الجمعية العمومية' },\n    { title: 'محاضر الاجتماعات', desc: 'محاضر اجتماعات مجلس الإدارة والجمعية العمومية' },\n    { title: 'الهيكل التنظيمي', desc: 'مخطط الهيكل التنظيمي وتوزيع المهام والصلاحيات' },\n    { title: 'سياسة الخصوصية', desc: 'سياسة الجمعية في حماية بيانات المتبرعين والمستخدمين' },\n    { title: 'تقارير الإنجاز', desc: 'تقارير مفصلة عن مشاريع الجمعية وإنجازاتها السنوية' },\n  ];\n\n  board = [\n    { letter: 'ي', bgColor: '', textColor: '', role: 'د. يوسف الجبر',         dept: 'رئيس مجلس الإدارة' },\n    { letter: 'غ', bgColor: '', textColor: '', role: 'أ. غازي القصيبي',        dept: 'نائب رئيس مجلس الإدارة' },\n    { letter: 'م', bgColor: '', textColor: '', role: 'م. محمد البشير',          dept: 'عضو مجلس الإدارة' },\n    { letter: 'ع', bgColor: '', textColor: '', role: 'م. عبدالمحسن الدرويش',   dept: 'عضو مجلس الإدارة' },\n    { letter: 'إ', bgColor: '', textColor: '', role: 'أ. إبراهيم الزنة',        dept: 'عضو مجلس الإدارة' },\n    { letter: 'ع', bgColor: '', textColor: '', role: 'أ. عبدالحميد النعيم',     dept: 'عضو مجلس الإدارة' },\n    { letter: 'ع', bgColor: '', textColor: '', role: 'م. عبدالرحمن النعيم',     dept: 'عضو مجلس الإدارة' },\n    { letter: 'م', bgColor: '', textColor: '', role: 'أ. مها العيسى',           dept: 'المدير التنفيذي' },\n  ];\n\n  componentDidMount() {\n    window.addEventListener('scroll', this.handleScroll, { passive: true });\n    this.setupScrollReveal();\n    this.setupCounterObserver();\n  }\n\n  componentWillUnmount() {\n    window.removeEventListener('scroll', this.handleScroll);\n  }\n\n  handleScroll = () => {\n    const scrolled = window.scrollY > 60;\n    if (scrolled !== this.state.navScrolled) {\n      this.setState({ navScrolled: scrolled });\n    }\n  };\n\n  setupScrollReveal() {\n    const io = new IntersectionObserver((entries) => {\n      entries.forEach(entry => {\n        if (entry.isIntersecting) {\n          entry.target.style.opacity = '1';\n          entry.target.style.transform = 'translateY(0)';\n          io.unobserve(entry.target);\n        }\n      });\n    }, { threshold: 0.07, rootMargin: '0px 0px -30px 0px' });\n\n    setTimeout(() => {\n      document.querySelectorAll('.reveal').forEach(el => {\n        el.style.opacity = '0';\n        el.style.transform = 'translateY(28px)';\n        el.style.transition = 'opacity 0.65s ease, transform 0.65s ease';\n        io.observe(el);\n      });\n    }, 120);\n  }\n\n  setupCounterObserver() {\n    setTimeout(() => {\n      const sec = document.getElementById('stats-section');\n      if (!sec) return;\n      const io = new IntersectionObserver((entries) => {\n        if (entries[0].isIntersecting && !this.state.countersAnimated) {\n          this.setState({ countersAnimated: true });\n          this.runCounters();\n          io.disconnect();\n        }\n      }, { threshold: 0.3 });\n      io.observe(sec);\n    }, 250);\n  }\n\n  runCounters() {\n    document.querySelectorAll('[data-count-target]').forEach(el => {\n      const target  = parseFloat(el.dataset.countTarget);\n      const suffix  = el.dataset.countSuffix  || '';\n      const prefix  = el.dataset.countPrefix  || '';\n      const decimal = el.dataset.countDecimal === 'true';\n      const dur     = 1800;\n      const t0      = performance.now();\n      const tick = (now) => {\n        const p  = Math.min((now - t0) / dur, 1);\n        const ep = 1 - Math.pow(1 - p, 3);\n        const v  = target * ep;\n        el.textContent = decimal\n          ? prefix + (v / 10).toFixed(1) + suffix\n          : prefix + Math.floor(v).toLocaleString('en-US') + suffix;\n        if (p < 1) requestAnimationFrame(tick);\n      };\n      requestAnimationFrame(tick);\n    });\n  }\n\n  toggleMobileMenu = () => {\n    this.setState(s => ({ mobileMenuOpen: !s.mobileMenuOpen }));\n  };\n\n  onFormSubmit = (e) => { e.preventDefault(); };\n\n  // ── Donate Modal ──\n  PKGS = {\n    50:   { amount: '50 ر.س',    name: 'محسن',       desc: 'مصحف جديد واحد + شهادة إلكترونية' },\n    200:  { amount: '200 ر.س',   name: 'داعم',        desc: '5 مصاحف + شهادة بالاسم' },\n    500:  { amount: '500 ر.س',   name: 'خيّر',        desc: '15 مصحفاً + كفالة ترميم' },\n    1000: { amount: '1,000 ر.س', name: 'راعي الخير',  desc: '40 مصحفاً + لوح شرف الراعين' },\n  };\n\n  openDonate = (amt) => this.setState({ showDonateModal: true, selectedPkg: this.PKGS[amt], donateSuccess: false });\n  openDonate50   = () => this.openDonate(50);\n  openDonate200  = () => this.openDonate(200);\n  openDonate500  = () => this.openDonate(500);\n  openDonate1000 = () => this.openDonate(1000);\n  closeDonateModal = () => this.setState({ showDonateModal: false, donateSuccess: false });\n  stopModalProp = (e) => e.stopPropagation();\n\n  submitDonate = (e) => {\n    e.preventDefault();\n    const g = id => document.getElementById(id)?.value || '';\n    const now = new Date();\n    const date = `${now.getDate().toString().padStart(2,'0')}/${(now.getMonth()+1).toString().padStart(2,'0')}/${now.getFullYear()}`;\n    const pkg = this.state.selectedPkg;\n    const entry = {\n      ref: `ORD-${now.getFullYear()}-${String(Date.now()).slice(-3)}`,\n      donor:   g('don_name'),\n      phone:   g('don_phone'),\n      pkg:     pkg.name,\n      amount:  pkg.amount,\n      payment: g('don_payment') || 'مدى',\n      date,\n      notes: '',\n      status: 'قيد المعالجة',\n      statusLabel: 'قيد المعالجة',\n      statusStyle: { background:'#FAF5EE', color:'#C4A882', display:'inline-flex', alignItems:'center', padding:'3px 10px', borderRadius:'100px', fontSize:'12px', fontWeight:'700' },\n    };\n    try {\n      const existing = JSON.parse(localStorage.getItem('einaya_donations') || '[]');\n      existing.unshift(entry);\n      localStorage.setItem('einaya_donations', JSON.stringify(existing));\n    } catch(err) {}\n    this.setState({ donateSuccess: true });\n    e.target.reset();\n  };\n\n  // ── Beneficiary Modal ──\n  openBenefModal  = () => this.setState({ showBenefModal: true, benefSuccess: false });\n  closeBenefModal = () => this.setState({ showBenefModal: false, benefSuccess: false });\n\n  submitBenef = (e) => {\n    e.preventDefault();\n    const g = id => document.getElementById(id)?.value || '';\n    const now = new Date();\n    const date = `${now.getDate().toString().padStart(2,'0')}/${(now.getMonth()+1).toString().padStart(2,'0')}/${now.getFullYear()}`;\n    const entry = {\n      name:  g('ben_name'),\n      type:  g('ben_type'),\n      city:  g('ben_city'),\n      count: g('ben_count') || '1',\n      phone: g('ben_phone'),\n      notes: g('ben_notes') || '—',\n      date,\n      statusLabel: 'قيد المراجعة',\n      statusStyle: { background:'#FAF5EE', color:'#C4A882', display:'inline-flex', alignItems:'center', padding:'3px 10px', borderRadius:'100px', fontSize:'12px', fontWeight:'700' },\n    };\n    try {\n      const existing = JSON.parse(localStorage.getItem('einaya_benef_requests') || '[]');\n      existing.unshift(entry);\n      localStorage.setItem('einaya_benef_requests', JSON.stringify(existing));\n    } catch(err) {}\n    this.setState({ benefSuccess: true });\n    e.target.reset();\n  };\n\n  renderVals() {\n    const { navScrolled, mobileMenuOpen, showDonateModal, donateSuccess, selectedPkg, showBenefModal, benefSuccess } = this.state;\n    return {\n      boardLeaders:      this.board.slice(0, 2),\n      boardMembers:      this.board.slice(2),\n      stats:             this.stats,\n      projects:          this.projects,\n      govDocs:           this.govDocs,\n      board:             this.board,\n      navBg:             navScrolled ? 'rgba(255,255,255,0.97)' : 'transparent',\n      navShadow:         navScrolled ? '0 2px 20px rgba(0,0,0,0.07)' : 'none',\n      navTextColor:      navScrolled ? '#4E5F80' : '#FFFFFF',\n      mobileMenuDisplay: mobileMenuOpen ? 'flex' : 'none',\n      toggleMobileMenu:  this.toggleMobileMenu,\n      onFormSubmit:      this.onFormSubmit,\n      showDonateModal,\n      donateSuccess,\n      showDonateForm: !donateSuccess,\n      selectedPkg:    selectedPkg || this.PKGS[50],\n      openDonate50:   this.openDonate50,\n      openDonate200:  this.openDonate200,\n      openDonate500:  this.openDonate500,\n      openDonate1000: this.openDonate1000,\n      closeDonateModal: this.closeDonateModal,\n      submitDonate:     this.submitDonate,\n      stopModalProp:    this.stopModalProp,\n      showBenefModal,\n      benefSuccess,\n      showBenefForm: !benefSuccess,\n      openBenefModal:  this.openBenefModal,\n      closeBenefModal: this.closeBenefModal,\n      submitBenef:     this.submitBenef,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>

document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"><\u002Fdiv><span style=\"font-size:11px;color:#6B7E9F\">موزع<\u002Fspan><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <svg width=\"100%\" height=\"180\" viewBox=\"0 0 380 180\" preserveAspectRatio=\"xMidYMid meet\">\n              <line x1=\"36\" y1=\"160\" x2=\"380\" y2=\"160\" stroke=\"#D8DBE2\" stroke-width=\"1\"><\u002Fline>\n              <line x1=\"36\" y1=\"120\" x2=\"380\" y2=\"120\" stroke=\"#D8DBE2\" stroke-width=\"0.8\" stroke-dasharray=\"3,3\"><\u002Fline>\n              <line x1=\"36\" y1=\"80\" x2=\"380\" y2=\"80\" stroke=\"#D8DBE2\" stroke-width=\"0.8\" stroke-dasharray=\"3,3\"><\u002Fline>\n              <line x1=\"36\" y1=\"40\" x2=\"380\" y2=\"40\" stroke=\"#D8DBE2\" stroke-width=\"0.8\" stroke-dasharray=\"3,3\"><\u002Fline>\n              <text x=\"0\" y=\"164\" font-family=\"Cairo,sans-serif\" font-size=\"8\" fill=\"#9FAFC8\">0<\u002Ftext>\n              <text x=\"0\" y=\"124\" font-family=\"Cairo,sans-serif\" font-size=\"8\" fill=\"#9FAFC8\">600<\u002Ftext>\n              <text x=\"0\" y=\"84\" font-family=\"Cairo,sans-serif\" font-size=\"8\" fill=\"#9FAFC8\">1.2k<\u002Ftext>\n              <text x=\"0\" y=\"44\" font-family=\"Cairo,sans-serif\" font-size=\"8\" fill=\"#9FAFC8\">2.5k<\u002Ftext>\n              <sc-for list=\"{{ chartBars }}\" as=\"bar\" hint-placeholder-count=\"6\">\n                <rect x=\"{{ bar.bx }}\" y=\"{{ bar.by }}\" width=\"17\" height=\"{{ bar.bh }}\" rx=\"3\" fill=\"#4E5F80\" opacity=\"0.9\"><\u002Frect>\n                <rect x=\"{{ bar.gx }}\" y=\"{{ bar.gy }}\" width=\"17\" height=\"{{ bar.gh }}\" rx=\"3\" fill=\"#C4A882\" opacity=\"0.85\"><\u002Frect>\n                <text x=\"{{ bar.lx }}\" y=\"175\" font-family=\"Cairo,sans-serif\" font-size=\"9\" fill=\"#6B7E9F\" text-anchor=\"middle\">{{ bar.month }}<\u002Ftext>\n              <\u002Fsc-for>\n            <\u002Fsvg>\n          <\u002Fdiv>\n\n          <!-- Donut -->\n          <div style=\"background:#fff;border-radius:16px;pa -filter:blur(4px)\" onclick=\"{{ closeReceiveModal }}\">\n          <div style=\"background:#fff;border-radius:22px;padding:36px;width:560px;max-width:95vw;max-height:90vh;overflow-y:auto;box-shadow:0 24px 64px rgba(0,0,0,0.18)\" onclick=\"{{ stopPropagation }}\">\n            <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:28px\">\n              <div>\n                <h2 style=\"font-size:18px;font-weight:900;color:#111C32\">تسجيل استلام جديد<\u002Fh2>\n                <p style=\"font-size:12px;color:#6B7E9F;margin-top:3px\">أدخل بيانات المصاحف المستلمة<\u002Fp>\n              <\u002Fdiv>\n              <button onclick=\"{{ closeReceiveModal }}\" style=\"width:36px;height:36px;background:#F0F3F9;border:none;border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center\" style-hover=\"background:#FFE8E8\">\n                <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#6B7E9F\" stroke-width=\"2.5\"><line x1=\"18\" y1=\"6\" x2=\"6\" y2=\"18\"><\u002Fline><line x1=\"6\" y1=\"6\" x2=\"18\" y2=\"18\"><\u002Fline><\u002Fsvg>\n              <\u002Fbutton>\n            <\u002Fdiv>\n            <form style=\"display:flex;flex-direction:column;gap:18px\" onsubmit=\"{{ submitReceive }}\">\n              <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:16px\">\n                <div>\n                  <label style=\"display:block;font-size:12px;font-weight:700;color:#111C32;margin-bottom:7px\">تاريخ الاستلام <span style=\"color:#E05C5C\">*<\u002Fspan><\u002Flabel>\n                  <input type=\"date\" id=\"rcv_date\" required=\"\" style=\"width:100%;padding:11px 13px;border:1.5px solid #D8DBE2;border-radius:11px;font-size:13px;color:#111C32;background:#F5F6F8;outline:none;direction:ltr\" style-focus=\"border-color:#4E5F80\">\n                <\u002Fdiv>\n                <div>\n                  <label style=\"display:block;font-size:12px;font-weight:700;color:#111C3 e=\"padding:13px 16px;font-weight:600;color:#111C32\">🇮🇩 إندونيسيا<\u002Ftd><td style=\"padding:13px 16px;text-align:center;font-weight:700;color:#4E5F80\">150<\u002Ftd><td style=\"padding:13px 16px;text-align:center;color:#8A94A6\">٢٠٢٦/٠٤/١٠<\u002Ftd><td style=\"padding:13px 16px;text-align:center\"><span style=\"background:#E6F0EC;color:#2E7D4F;font-size:11px;font-weight:700;padding:3px 10px;border-radius:100px\">نشط<\u002Fspan><\u002Ftd><\u002Ftr>\n                  <tr style=\"border-bottom:1px solid #E8EBF2\"><td style=\"padding:13px 16px;font-weight:600;color:#111C32\">🇵🇰 باكستان<\u002Ftd><td style=\"padding:13px 16px;text-align:center;font-weight:700;color:#4E5F80\">120<\u002Ftd><td style=\"padding:13px 16px;text-align:center;color:#8A94A6\">٢٠٢٦/٠٣/٠٥<\u002Ftd><td style=\"padding:13px 16px;text-align:center\"><span style=\"background:#E6F0EC;color:#2E7D4F;font-size:11px;font-weight:700;padding:3px 10px;border-radius:100px\">نشط<\u002Fspan><\u002Ftd><\u002Ftr>\n                  <tr style=\"border-bottom:1px solid #E8EBF2\"><td style=\"padding:13px 16px;font-weight:600;color:#111C32\">🇸🇳 السنغال<\u002Ftd><td style=\"padding:13px 16px;text-align:center;font-weight:700;color:#4E5F80\">65<\u002Ftd><td style=\"padding:13px 16px;text-align:center;color:#8A94A6\">٢٠٢٦/٠٢/١٨<\u002Ftd><td style=\"padding:13px 16px;text-align:center\"><span style=\"background:#E6F0EC;color:#2E7D4F;font-size:11px;font-weight:700;padding:3px 10px;border-radius:100px\">نشط<\u002Fspan><\u002Ftd><\u002Ftr>\n                  <tr style=\"border-bottom:1px solid #E8EBF2\"><td style=\"padding:13px 16px;font-weight:600;color:#111C32\">🇲🇾 ماليزيا<\u002Ftd><td style=\"padding:13px 16px;text-align:center;font-weight:700;color:#4E5F80\">55<\u002Ftd><td style=\"padding:13px 16px;text-align:center;color:#8A94A6\">٢٠٢٦/٠١/٣٠<\u002Ftd><td style=\"padding:13px 16px;text-align:center\"><span style=\"background:#E6F0EC;color:#2E7D4F;font-size:11px;font-weight:700;padding:3px 10px;border-radius:100px\">نشط<\u002Fspan><\u002Ftd><\u002Ftr>\n                  <tr style=\"border-bottom:1px solid #E8EBF2\"><td style=\"padding:13px 16px;font-weight:600;color:#111C32\">🇳🇬 نيجيريا<\u002Ftd><td style=\"padding:13px 16px;text-align:center;font-weight:700;color:#4E5F80\">40<\u002Ftd><td style=\"padding:13px 16px;text-align:center;color:#8A94A6\">٢٠٢٥/١٢/١٢<\u002Ftd><td style=\"padding:13px 16px;text-align:center\"><span style=\"background:#FEF0E7;color:#E07B3A;font-size:11px;font-weight:700;padding:3px 10px;border-radius:100px\">متوقف مؤقتاً<\u002Fspan><\u002Ftd><\u002Ftr>\n                  <tr style=\"border-bottom:1px solid #E8EBF2\"><td style=\"padding:13px 16px;font-weight:600;color:#111C32\">🇸🇩 السودان<\u002Ftd><td style=\"padding:13px 16px;text-align:center;font-weight:700;color:#4E5F80\">30<\u002Ftd><td style=\"padding:13px 16px;text-align:center;color:#8A94A6\">٢٠٢٥/١١/٠٨<\u002Ftd><td style=\"padding:13px 16px;text-align:center\"><span style=\"background:#FEF0E7;color:#E07B3A;font-size:11px;font-weight:700;padding:3px 10px;border-radius:100px\">متوقف مؤقتاً<\u002Fspan><\u002Ftd><\u002Ftr>\n                  <tr style=\"border-bottom:1px solid #E8EBF2\"><td style=\"padding:13px 16px;font-weight:600;color:#111C32\">🇹🇷 تركيا<\u002Ftd><td style=\"padding:13px 16px;text-align:center;font-weight:700;color:#4E5F80\">15<\u002Ftd><td style=\"padding:13px 16px;text-align:center;color:#8A94A6\">٢٠٢٥/١٠/٢٠<\u002Ftd><td style=\"padding:13px 16px;text-align:center\"><span style=\"background:#E6F0EC;color:#2E7D4F;font-size:11px;font-weight:700;padding:3px 10px;border-radius:100px\">نشط<\u002Fspan><\u002Ftd><\u002Ftr>\n                  <tr style=\"border-bottom:1px solid #E8EBF2\"><td style=\"padding:13px 16px;font-weight:600;color:#111C32\">🇹🇳 تونس<\u002Ftd><td style=\"padding:13px 16px;text-align:center;font-weight:700;color:#4E5F80\">12<\u002Ftd><td style=\"padding:13px 16px;text-align:center;color:#8A94A6\">٢٠٢٥/٠٩/١٥<\u002Ftd><td style=\"padding:13px 16px;text-align:center\"><span style=\"background:#E6F0EC;color:#2E7D4F;font-size:11px;font-weight:700;padding:3px 10px;border-radius:100px\">نشط<\u002Fspan><\u002Ftd><\u002Ftr>\n                  <tr style=\"border-bottom:1px solid #E8EBF2\"><td style=\"padding:13px 16px;font-weight:600;color:#111C32\">🇲🇦 المغرب<\u002Ftd><td style=\"padding:13px 16px;text-align:center;font-weight:700;color:#4E5F80\">8<\u002Ftd><td style=\"padding:13px 16px;text-align:center;color:#8A94A6\">٢٠٢٥/٠٨/٠٣<\u002Ftd><td style=\"padding:13px 16px;text-align:center\"><span style=\"background:#E6F0EC;color:#2E7D4F;font-size:11px;font-weight:700;padding:3px 10px;border-radius:100px\">نشط<\u002Fspan><\u002Ftd><\u002Ftr>\n                  <tr><td style=\"padding:13px 16px;font-weight:600;color:#111C32\">🇬🇧 المملكة المتحدة<\u002Ftd><td style=\"padding:13px 16px;text-align:center;font-weight:700;color:#4E5F80\">5<\u002Ftd><td style=\"padding:13px 16px;text-align:center;color:#8A94A6\">٢٠٢٥/٠٧/٢٢<\u002Ftd><td style=\"padding:13px 16px;text-align:center\"><span style=\"background:#E6F0EC;color:#2E7D4F;font-size:11px;font-weight:700;padding:3px 10px;border-radius:100px\">نشط<\u002Fspan><\u002Ftd><\u002Ftr>\n                <\u002Ftbody>\n              <\u002Ftable>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ═══ LIFECYCLE ═══ -->\n      <sc-if value=\"{{ isLifecycle }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"display:grid;grid-template-columns:240px 1fr;gap:20px\">\n          <div style=\"background:#fff;border-radius:16px;padding:18px;box-shadow:0 2px 12px rgba(28,94,56,0.06);border:1px solid #D8DBE2\">\n            <h3 style=\"font-size:14px;font-weight:800;color:#111C32;margin-bottom:14px\">اختر مصحفاً<\u002Fh3>\n            <div style=\"display:flex;flex-direction:column;gap:8px\">\n              <sc-for list=\"{{ lcMushafs }}\" as=\"m\" hint-placeholder-count=\"5\">\n                <div style=\"{{ m.cardStyle }}\" onclick=\"{{ m.onClick }}\">\n                  <div style=\"font-size:11px;font-weight:700;color:#4E5F80;direction:ltr;font-family:monospace;margin-bottom:2px\">{{ m.qr }}<\u002Fdiv>\n                  <div style=\"font-size:12px;color:#111C32;font-weight:600\">{{ m.type }}<\u002Fdiv>\n                  <div style=\"font-size:11px;color:#6B7E9F;margin-top:2px\">{{ m.stage }}<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"background:#fff;border-radius:16px;padding:24px;box-shadow:0 2px 12px rgba(28,94,56,0.06);border:1px solid #D8DBE2\">\n            <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:24px\">\n              <h3 style=\"font-size:16px;font-weight:800;color:#111C32\">دورة حياة المصحف<\u002Fh3>\n              <span style=\"font-size:12px;font-weight:700;color:#4E5F80;background:#E8E9EE;padding:4px 12px;border-radius:100px;direction:ltr\">{{ selectedQR }}<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column\">\n              <sc-for list=\"{{ lcSteps }}\" as=\"step\" hint-placeholder-count=\"5\">\n                <div style=\"display:flex;gap:16px\">\n                  <div style=\"display:flex;flex-direction:column;align-items:center\">\n                    <div style=\"{{ step.circleStyle }}\">\n                      <span style=\"font-size:13px;font-weight:800;color:{{ step.circleTextColor }}\">{{ step.circleText }}<\u002Fspan>\n                    <\u002Fdiv>\n                    <div style=\"{{ step.lineStyle }}\"><\u002Fdiv>\n                  <\u002Fdiv>\n                  <div style=\"padding-bottom:26px;flex:1;min-width:0\">\n                    <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:5px\">\n                      <span style=\"font-size:14px;font-weight:800;color:{{ step.titleColor }}\">{{ step.title }}<\u002Fspan>\n                      <span style=\"{{ step.badgeStyle }}\">{{ step.badge }}<\u002Fspan>\n                    <\u002Fdiv>\n                    <p style=\"font-size:13px;color:#6B7E9F;line-height:1.7\">{{ step.desc }}<\u002Fp>\n                    <div style=\"font-size:11px;color:#9FAFC8;margin-top:4px\">{{ step.date }}<\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ═══ ORDERS MODAL ═══ -->\n      <sc-if value=\"{{ showOrderModal }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"position:fixed;inset:0;z-index:1000;display:flex;align-items:center;justify-content:center;background:rgba(10,34,24,0.55);backdrop-filter:blur(4px)\" onclick=\"{{ closeOrderModal }}\">\n          <div style=\"background:#fff;border-radius:22px;padding:36px;width:580px;max-width:96vw;max-height:92vh;overflow-y:auto;box-shadow:0 24px 64px rgba(0,0,0,0.18)\" onclick=\"{{ stopPropagation }}\">\n            <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:26px\">\n              <div>\n                <h2 style=\"font-size:18px;font-weight:900;color:#111C32\">تسجيل طلب جديد<\u002Fh2>\n                <p style=\"font-size:12px;color:#6B7E9F;margin-top:3px\">أدخل بيانات المتبرع والتبرع<\u002Fp>\n              <\u002Fdiv>\n              <button onclick=\"{{ closeOrderModal }}\" style=\"width:36px;height:36px;background:#F0F3F9;border:none;border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center\" style-hover=\"background:#FFE8E8\">\n                <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#6B7E9F\" stroke-width=\"2.5\"><line x1=\"18\" y1=\"6\" x2=\"6\" y2=\"18\"><\u002Fline><line x1=\"6\" y1=\"6\" x2=\"18\" y2=\"18\"><\u002Fline><\u002Fsvg>\n              <\u002Fbutton>\n            <\u002Fdiv>\n            <form style=\"display:flex;flex-direction:column;gap:18px\" onsubmit=\"{{ submitOrder }}\">\n\n              <!-- اسم المتبرع + رقم الجوال -->\n              <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:16px\">\n                <div>\n                  <label style=\"display:block;font-size:12px;font-weight:700;color:#111C32;margin-bottom:7px\">اسم المتبرع <span style=\"color:#E05C5C\">*<\u002Fspan><\u002Flabel>\n                  <input type=\"text\" id=\"ord_donor\" placeholder=\"الاسم الكامل\" required=\"\" style=\"width:100%;padding:11px 13px;border:1.5px solid #D8DBE2;border-radius:11px;font-size:13px;color:#111C32;background:#F5F6F8;outline:none\" style-focus=\"border-color:#4E5F80\">\n                <\u002Fdiv>\n                <div>\n                  <label style=\"display:block;font-size:12px;font-weight:700;color:#111C32;margin-bottom:7px\">رقم الجوال<\u002Flabel>\n                  <input type=\"tel\" id=\"ord_phone\" placeholder=\"+966 5X XXX XXXX\" style=\"width:100%;padding:11px 13px;border:1.5px solid #D8DBE2;border-radius:11px;font-size:13px;color:#111C32;background:#F5F6F8;outline:none;direction:ltr\" style-focus=\"border-color:#4E5F80\">\n                <\u002Fdiv>\n              <\u002Fdiv>\n\n              <!-- الباقة + المبلغ -->\n              <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:16px\">\n                <div>\n                  <label style=\"display:block;font-size:12px;font-weight:700;color:#111C32;margin-bottom:7px\">الباقة <span style=\"color:#E05C5C\">*<\u002Fspan><\u002Flabel>\n                  <select id=\"ord_pkg\" required=\"\" style=\"width:100%;padding:11px 13px;border:1.5px solid #D8DBE2;border-radius:11px;font-size:13px;color:#111C32;background:#F5F6F8;outline:none;cursor:pointer\" style-focus=\"border-color:#4E5F80\">\n                    <option value=\"\">اختر الباقة<\u002Foption>\n                    <option>محسن — 50 ر.س<\u002Foption>\n                    <option>داعم — 200 ر.س<\u002Foption>\n                    <option>خيّر — 500 ر.س<\u002Foption>\n                    <option>راعي الخير — 1,000 ر.س<\u002Foption>\n                  <\u002Fselect>\n                <\u002Fdiv>\n                <div>\n                  <label style=\"display:block;font-size:12px;font-weight:700;color:#111C32;margin-bottom:7px\">المبلغ (ريال) <span style=\"color:#E05C5C\">*<\u002Fspan><\u002Flabel>\n                  <input type=\"number\" id=\"ord_amount\" min=\"1\" placeholder=\"0\" required=\"\" style=\"width:100%;padding:11px 13px;border:1.5px solid #D8DBE2;border-radius:11px;font-size:14px;font-weight:700;color:#4E5F80;background:#F5F6F8;outline:none;direction:ltr;text-align:center\" style-focus=\"border-color:#4E5F80\">\n                <\u002Fdiv>\n              <\u002Fdiv>\n\n              <!-- طريقة الدفع + التاريخ -->\n              <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:16px\">\n                <div>\n                  <label style=\"display:block;font-size:12px;font-weight:700;color:#111C32;margin-bottom:7px\">طريقة الدفع<\u002Flabel>\n                  <select id=\"ord_payment\" style=\"width:100%;padding:11px 13px;border:1.5px solid #D8DBE2;border-radius:11px;font-size:13px;color:#111C32;background:#F5F6F8;outline:none;cursor:pointer\" style-focus=\"border-color:#4E5F80\">\n                    <option value=\"\">اختر الطريقة<\u002Foption>\n                    <option>مدى<\u002Foption>\n                    <option>Apple Pay<\u002Foption>\n                    <option>تحويل بنكي<\u002Foption>\n                    <option>نقداً<\u002Foption>\n                  <\u002Fselect>\n                <\u002Fdiv>\n                <div>\n                  <label style=\"display:block;font-size:12px;font-weight:700;color:#111C32;margin-bottom:7px\">تاريخ الطلب <span style=\"color:#E05C5C\">*<\u002Fspan><\u002Flabel>\n                  <input type=\"date\" id=\"ord_date\" required=\"\" style=\"width:100%;padding:11px 13px;border:1.5px solid #D8DBE2;border-radius:11px;font-size:13px;color:#111C32;background:#F5F6 ection:ltr\">{{ o.amount }}<\u002Ftd>\n                  <td style=\"padding:11px 12px\"><span style=\"{{ o.statusStyle }}\">{{ o.statusLabel }}<\u002Fspan><\u002Ftd>\n                  <td style=\"padding:11px 12px;font-size:11px;color:#6B7E9F\">{{ o.date }}<\u002Ftd>\n                  <td style=\"padding:11px 12px\">\n                    <button onclick=\"{{ o.onEdit }}\" style=\"width:30px;height:30px;background:#E8EBF5;color:#4E5F80;border:none;border-radius:8px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center\" style-hover=\"background:#4E5F80;color:#fff\"><svg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\" stroke-linecap=\"round\"><path d=\"M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7\"><\u002Fpath><path d=\"M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z\"><\u002Fpath><\u002Fsvg><\u002Fbutton>\n                  <\u002Ftd>\n                <\u002Ftr>\n              \n            <\u002Ftbody>\n          <\u002Ftable>\n        <\u002Fdiv>\n      \n\n      <!-- ═══ MUSHAF MODAL ═══ -->\n      <sc-if value=\"{{ showMushhafModal }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"position:fixed;inset:0;z-index:1000;display:flex;align-items:center;justify-content:center;background:rgba(10,34,24,0.55);backdrop-filter:blur(4px)\" onclick=\"{{ closeMushhafModal }}\">\n          <div style=\"background:#fff;border-radius:22px;padding:36px;width:500px;max-width:96vw;max-height:92vh;overflow-y:auto;box-shadow:0 24px 64px rgba(0,0,0,0.18)\" onclick=\"{{ stopPropagation }}\">\n            <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:26px\">\n              <div>\n                <h2 style=\"font-size:18px;font-weight:900;color:#111C32\">إضافة مصحف جديد<\u002Fh2>\n                <p style=\"font-size:12px;color:#6B7E9F;margin-top:3px\">أدخل بيانات المصحف<\u002Fp>\n              <\u002Fdiv>\n              <button onclick=\"{{ closeMushhafModal }}\" style=\"width:36px;height:36px;background:#F2F3F5;border:none;border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center\" style-hover=\"background:#FFE8E8\">\n                <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#6B7E9F\" stroke-width=\"2.5\"><line x1=\"18\" y1=\"6\" x2=\"6\" y2=\"18\"><\u002Fline><line x1=\"6\" y1=\"6\" x2=\"18\" y2=\"18\"><\u002Fline><\u002Fsvg>\n              <\u002Fbutton>\n            <\u002Fdiv>\n            <form style=\"display:flex;flex-direction:column;gap:18px\" onsubmit=\"{{ submitMushhaf }}\">\n\n              <!-- الاسم -->\n              <div>\n                <label style=\"display:block;font-size:12px;font-weight:700;color:#111C32;margin-bottom:7px\">اسم المصحف <span style=\"color:#E05C5C\">*<\u002Fspan><\u002Flabel>\n                <input type=\"text\" id=\"msh_name\" placeholder=\"مثال: مصحف حافظ بالرسم العثماني\" required=\"\" style=\"width:100%;padding:11px 13px;border:1.5px solid #D8DBE2;border-radius:11px;font-size:13px;color:#111C32;background:#F7F8FA;outline:none\" style-focus=\"border-color:#4E5F80\">\n              <\u002Fdiv>\n\n              <!-- الحجم + النوع -->\n              <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:16px\">\n                <div>\n                  <label style=\"display:block;font-size:12px;font-weight:700;color:#111C32;margin-bottom:7px\">الحجم <span style=\"color:#E05C5C\">*<\u002Fspan><\u002Flabel>\n                  <select id=\"msh_size\" required=\"\" style=\"width:100%;padding:11px 13px;border:1.5px solid #D8DBE2;border-radius:11px;font-size:13px;color:#111C32;background:#F7F8FA;outline:none;cursor:pointer\" style-focus=\"border-color:#4E5F80\">\n                    <option value=\"\">اختر الحجم<\u002Foption>\n                    <option>جوامعي (كبير)<\u002Foption>\n                    <option>عادي (وسط)<\u002Foption>\n                    <option>مجزأ<\u002Foption>\n                    <option>جيب (صغير)<\u002Foption>\n                  <\u002Fselect>\n                <\u002Fdiv>\n                <div>\n                  <label style=\"display:block;font-size:12px;font-weight:700;color:#111C32;margin-bottom:7px\">النوع <span style=\"color:#E05C5C\">*<\u002Fspan><\u002Flabel>\n                  <select id=\"msh_type\" required=\"\" style=\"width:100%;padding:11px 13px;border:1.5px solid #D8DBE2;border-radius:11px;font-size:13px;color:#111C32;background:#F7F8FA;outline:none;cursor:pointer\" style-focus=\"border-color:#4E5F80\">\n                    <option value=\"\">اختر النوع<\u002Foption>\n                    <option>مصحف حافظ<\u002Foption>\n                    <option>مصحف تجويد<\u002Foption>\n                    <option>مصحف كريم<\u002Foption>\n                    <option>مصحف قالون<\u002Foption>\n                    <option>مصحف مقوى<\u002Foption>\n                    <option>مصحف ورش<\u002Foption>\n                    <option>مصحف عادي<\u002Foption>\n                  <\u002Fselect>\n                <\u002Fdiv>\n              <\u002Fdiv>\n\n              <!-- السعر -->\n              <div>\n                <label style=\"display:block;font-size:12px;font-weight:700;color:#111C32;margin-bottom:7px\">السعر (ريال)<\u002Flabel>\n                <input type=\"number\" id=\"msh_price\" min=\"0\" placeholder=\"0.00\" style=\"width:100%;padding:11px 13px;border:1.5px solid #D8DBE2;border-radius:11px;font-size:14px;font-weight:700;color:#4E5F80;background:#F7F8FA;outline:none;direction:ltr;text-align:center\" style-focus=\"border-color:#4E5F80\">\n              <\u002Fdiv>\n\n              <!-- ملاحظات -->\n              <div>\n                <label style=\"display:block;font-size:12px;font-weight:700;color:#111C32;margin-bottom:7px\">ملاحظات (اختياري)<\u002Flabel>\n                <textarea id=\"msh_notes\" placeholder=\"أي ملاحظات إضافية...\" rows=\"3\" style=\"width:100%;padding:11px 13px;border:1.5px solid #D8DBE2;border-radius:11px;font-size:13px;color:#111C32;background:#F7F8FA;outline:none;resize:vertical;line-height:1.7\" style-focus=\"border-color:#4E5F80\"><\u002Ftextarea>\n              <\u002Fdiv>\n\n              <div style=\"display:flex;gap:12px;margin-top:4px\">\n                <button type=\"submit\" style=\"flex:1;padding:13px;background:linear-gradient(135deg,#4E5F80,#5A6F9E);color:#fff;font-size:15px;font-weight:800;border:none;border-radius:12px;cursor:pointer;box-shadow:0 4px 16px rgba(78,95,128,0.28)\" style-hover=\"box-shadow:0 6px 22px rgba(78,95,128,0.4)\">حفظ المصحف<\u002Fbutton>\n                <button type=\"button\" onclick=\"{{ closeMushhafModal }}\" style=\"padding:13px 24px;background:#F2F3F5;color:#6B7E9F;font-size:15px;font-weight:700;border:none;border-radius:12px;cursor:pointer\" style-hover=\"background:#E8E9EE\">إلغاء<\u002Fbutton>\n              <\u002Fdiv>\n\n            <\u002Fform>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ═══ INVENTORY ═══ -->\n      <sc-if value=\"{{ isInventory }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"display:flex;justify-content:flex-end;margin-bottom:16px\">\n            <button onclick=\"{{ openMushhafModal }}\" style=\"display:flex;align-items:center;gap:6px;padding:9px 16px;background:#4E5F80;color:#fff;font-size:13px;font-weight:700;border:none;border-radius:10px;cursor:pointer\" style-hover=\"background:#3A4D6E\">\n              <svg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\"><line x1=\"12\" y1=\"5\" x2=\"12\" y2=\"19\"><\u002Fline><line x1=\"5\" y1=\"12\" x2=\"19\" y2=\"12\"><\u002Fline><\u002Fsvg>\n              إضافة مصحف جديد\n            <\u002Fbutton>\n          <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- New mushaf entries table -->\n      <sc-if value=\"{{ hasMushhafEntries }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"background:#fff;border-radius:16px;padding:22px;box-shadow:0 2px 12px rgba(78,95,128,0.06);border:1px solid #D8DBE2;margin-top:18px\">\n          <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:18px\">\n            <h3 style=\"font-size:15px;font-weight:800;color:#111C32\">سجل المصاحف<\u002Fh3>\n            <span style=\"font-size:12px;font-weight:700;background:#E8EBF5;color:#4E5F80;padding:4px 13px;border-radius:100px\">{{ mushhafCount }} مصحف<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"overflow-x:auto\">\n          <sc-for list=\"{{ mushhafEntries }}\" as=\"m\" hint-placeholder-count=\"2\">\n                <\u002Fsc-for><table style=\"min-width:750px\">\n            <thead><tr style=\"border-bottom:2px solid #D8DBE2;background:#F5F6F8\">\n              <th style=\"padding:9px 12px;font-size:11px;font-weight:700;color:#6B7E9F\">رمز QR<\u002Fth>\n              <th style=\"padding:9px 12px;font-size:11px;font-weight:700;color:#6B7E9F\">الاسم<\u002Fth>\n              <th style=\"padding:9px 12px;font-size:11px;font-weight:700;color:#6B7E9F;text-align:center\">الحجم<\u002Fth>\n              <th style=\"padding:9px 12px;font-size:11px;font-weight:700;color:#6B7E9F;text-align:center\">النوع<\u002Fth>\n              <th style=\"padding:9px 12px;font-size:11px;font-weight:700;color:#6B7E9F;text-align:center\">السعر<\u002Fth>\n              <th style=\"padding:9px 12px;font-size:11px;font-weight:700;color:#6B7E9F\">ملاحظات<\u002Fth>\n              <th style=\"padding:9px 12px;font-size:11px;font-weight:700;color:#6B7E9F\">التاريخ<\u002Fth>\n              <th style=\"padding:9px 12px;font-size:11px;font-weight:700;color:#6B7E9F;text-align:center\">إجراءات<\u002Fth>\n            <\u002Ftr><\u002Fthead>\n            <tbody>\n              <tr style=\"border-bottom:1px solid #EEEEF1\" style-hover=\"background:#F5F6F8\">\n                  <td style=\"padding:10px 12px;font-size:11px;font-weight:700;color:#4E5F80;font-family:monospace;direction:ltr\">{{ m.qr }}<\u002Ftd>\n                  <td style=\"padding:10px 12px;font-size:13px;font-weight:700;color:#111C32\">{{ m.name }}<\u002Ftd>\n                  <td style=\"padding:10px 12px;font-size:12px;color:#6B7E9F;text-align:center\">{{ m.size }}<\u002Ftd>\n                  <td style=\"padding:10px 12px;font-size:12px;color:#6B7E9F;text-align:center\">{{ m.type }}<\u002Ftd>\n                  <td style=\"padding:10px 12px;font-size:13px;font-weight:700;color:#4E5F80;text-align:center;direction:ltr\">{{ m.price }}<\u002Ftd>\n                  <td style=\"padding:10px 12px;font-size:12px;color:#6B7E9F\">{{ m.notes }}<\u002Ftd>\n                  <td style=\"padding:10px 12px;font-size:12px;color:#6B7E9F;white-space:nowrap\">{{ m.date }}<\u002Ftd>\n                  <td style=\"padding:10px 12px\">\n                    <button onclick=\"{{ m.onEdit }}\" style=\"width:30px;height:30px;background:#E8EBF5;color:#4E5F80;border:none;border-radius:8px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center\" style-hover=\"background:#4E5F80;color:#fff\"><svg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\" stroke-linecap=\"round\"><path d=\"M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7\"><\u002Fpath><path d=\"M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z\"><\u002Fpath><\u002Fsvg><\u002Fbutton>\n                    <button onclick=\"{{ m.onDelete }}\" style=\"width:30px;height:30px;background:#FFE8E8;color:#C92929;border:none;border-radius:8px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;margin-right:4px\" style-hover=\"background:#C92929;color:#fff\"><svg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\" stroke-linecap=\"round\"><polyline points=\"3 6 5 6 21 6\"><\u002Fpolyline><path d=\"M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6\"><\u002Fpath><path d=\"M10 11v6M14 11v6\"><\u002Fpath><path d=\"M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2\"><\u002Fpath><\u002Fsvg><\u002Fbutton>\n                  <\u002Ftd>\n                <\u002Ftr>\n              \n            <\u002Ftbody>\n          <\u002Ftable>\n        <\u002Fdiv>\n      \n\n      <!-- ═══ DONORS ═══ -->\n      <!-- ═══ DONORS ═══ -->\n      <sc-if value=\"{{ isDonors }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"display:flex;flex-direction:column;gap:20px\">\n          <div style=\"display:flex;justify-content:space-between;align-items:center\">\n            <div style=\"font-size:14px;color:#6B7E9F\">إجمالي المتبرعين: <strong style=\"color:#111C32\">{{ donorCount }}<\u002Fstrong><\u002Fdiv>\n            <button onclick=\"{{ openDonorModal }}\" style=\"display:flex;align-items:center;gap:8px;background:#4E5F80;color:#fff;border:none;padding:10px 20px;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer\" style-hover=\"background:#3A4D6E\">\n              <svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\" stroke-linecap=\"round\"><line x1=\"12\" y1=\"5\" x2=\"12\" y2=\"19\"><\u002Fline><line x1=\"5\" y1=\"12\" x2=\"19\" y2=\"12\"><\u002Fline><\u002Fsvg>\n              إضافة متبرع\n            <\u002Fbutton>\n          <\u002Fdiv>\n          <div style=\"background:#fff;border-radius:16px;border:1px solid #D8DBE2;overflow-x:auto\">\n            <sc-for list=\"{{ donorItems }}\" as=\"d\" hint-placeholder-count=\"3\">\n                  <\u002Fsc-for><table style=\"width:100%;border-collapse:collapse;font-size:13px\">\n              <thead>\n                <tr style=\"background:#F0F2F7\">\n                  <th style=\"padding:13px 16px;font-weight:700;color:#4E5F80;border-bottom:1px solid #D8DBE2\">#<\u002Fth>\n                  <th style=\"padding:13px 16px;font-weight:700;color:#4E5F80;border-bottom:1px solid #D8DBE2\">اسم المتبرع<\u002Fth>\n                  <th style=\"padding:13px 16px;font-weight:700;color:#4E5F80;border-bottom:1px solid #D8DBE2\">رقم الجوال<\u002Fth>\n                  <th style=\"padding:13px 16px;font-weight:700;color:#4E5F80;border-bottom:1px solid #D8DBE2\">البريد الإلكتروني<\u002Fth>\n                  <th style=\"padding:13px 16px;font-weight:700;color:#4E5F80;border-bottom:1px solid #D8DBE2\">مبلغ التبرع<\u002Fth>\n                  <th style=\"padding:13px 16px;font-weight:700;color:#4E5F80;border-bottom:1px solid #D8DBE2\">تاريخ التبرع<\u002Fth>\n                  <th style=\"padding:13px 16px;font-weight:700;color:#4E5F80;border-bottom:1px solid #D8DBE2\">الإجراءات<\u002Fth>\n                <\u002Ftr>\n              <\u002Fthead>\n              <tbody>\n                <tr style=\"border-bottom:1px solid #E8EBF2\" style-hover=\"background:#F7F8FB\">\n                    <td style=\"padding:12px 16px;color:#8A94A6\">{{ d.idx }}<\u002Ftd>\n                    <td style=\"padding:12px 16px;font-weight:600;color:#111C32\">{{ d.name }}<\u002Ftd>\n                    <td style=\"padding:12px 16px;color:#4E5F80;direction:ltr;text-align:right\">{{ d.phone }}<\u002Ftd>\n                    <td style=\"padding:12px 16px;color:#6B7E9F;direction:ltr;text-align:right\">{{ d.email }}<\u002Ftd>\n                    <td style=\"padding:12px 16px;font-weight:700;color:#C4A882\">{{ d.amount }} ريال<\u002Ftd>\n                    <td style=\"padding:12px 16px;color:#6B7E9F\">{{ d.date }}<\u002Ftd>\n                    <td style=\"padding:12px 16px\">\n                      <div style=\"display:flex;gap:8px\">\n                        <button onclick=\"{{ d.onEdit }}\" style=\"background:#EEF0F5;border:none;border-radius:8px;width:32px;height:32px;cursor:pointer;display:flex;align-items:center;justify-content:center\" style-hover=\"background:#4E5F80;color:#fff\" title=\"تعديل\">\n                          <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\"><path d=\"M11 4H4a :36px;cursor:pointer;font-size:18px;color:#6B7E9F\">✕<\u002Fbutton>\n            <\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;gap:16px\">\n              <div><label style=\"display:block;font-size:13px;font-weight:700;color:#111C32;margin-bottom:6px\">اسم المتبرع *<\u002Flabel><input type=\"text\" value=\"{{ donorForm.name }}\" oninput=\"{{ onDonorName }}\" placeholder=\"أدخل اسم المتبرع\" style=\"width:100%;padding:11px 14px;border:1.5px solid #D8DBE2;border-radius:10px;font-size:14px;outline:none\" style-focus=\"border-color:#4E5F80\"><\u002Fdiv>\n              <div><label style=\"display:block;font-size:13px;font-weight:700;color:#111C32;margin-bottom:6px\">رقم الجوال<\u002Flabel><input type=\"tel\" value=\"{{ donorForm.phone }}\" oninput=\"{{ onDonorPhone }}\" placeholder=\"+966 5XX XXX XXXX\" style=\"width:100%;padding:11px 14px;border:1.5px solid #D8DBE2;border-radius:10px;font-size:14px;outline:none;direction:ltr\" style-focus=\"border-color:#4E5F80\"><\u002Fdiv>\n              <div><label style=\"display:block;font-size:13px;font-weight:700;color:#111C32;margin-bottom:6px\">البريد الإلكتروني<\u002Flabel><input type=\"email\" value=\"{{ donorForm.email }}\" oninput=\"{{ onDonorEmail }}\" placeholder=\"email@example.com\" style=\"width:100%;padding:11px 14px;border:1.5px solid #D8DBE2;border-radius:10px;font-size:14px;outline:none;direction:ltr\" style-focus=\"border-color:#4E5F80\"><\u002Fdiv>\n              <div><label style=\"display:block;font-size:13px;font-weight:700;color:#111C32;margin-bottom:6px\">مبلغ التبرع (ريال)<\u002Flabel><input type=\"number\" value=\"{{ donorForm.amount }}\" oninput=\"{{ onDonorAmount }}\" placeholder=\"0\" style=\"width:100%;padding:11px 14px;border:1.5px solid #D8DBE2;border-radius:10px;font-size:14px;outline:none;direction:ltr\" style-focus=\"border-color:#4E5F80\"><\u002Fdiv>\n              <div><label style=\"display:block;font-size:13px;font-weight:700;color:#111C32;margin-bottom:6px\">تاريخ ا flex;gap:8px\">\n                        <button onclick=\"{{ b.onEdit }}\" style=\"background:#EEF0F5;border:none;border-radius:8px;width:32px;height:32px;cursor:pointer;display:flex;align-items:center;justify-content:center\" style-hover=\"background:#4E5F80;color:#fff\" title=\"تعديل\">\n                          <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\"><path d=\"M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7\"><\u002Fpath><path d=\"M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z\"><\u002Fpath><\u002Fsvg>\n                        <\u002Fbutton>\n                        <button onclick=\"{{ b.onDelete }}\" style=\"background:#FEF0F0;border:none;border-radius:8px;width:32px;height:32px;cursor:pointer;display:flex;align-items:center;justify-content:center\" style-hover=\"background:#e05c5c;color:#fff\" title=\"حذف\">\n                          <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\"><polyline points=\"3 6 5 6 21 6\"><\u002Fpolyline><path d=\"M19 6l-1 14H6L5 6\"><\u002Fpath><path d=\"M10 11v6\"><\u002Fpath><path d=\"M14 11v6\"><\u002Fpath><path d=\"M9 6V4h6v2\"><\u002Fpath><\u002Fsvg>\n                        <\u002Fbutton>\n                      <\u002Fdiv>\n                    <\u002Ftd>\n                  <\u002Ftr>\n                \n              <\u002Ftbody>\n            <\u002Ftable>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ═══ BENEFICIARY MODAL ═══ -->\n      <sc-if value=\"{{ showBenefModal }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"position:fixed;inset:0;z-index:1000;display:flex;align-items:center;justify-content:center;background:rgba(10,34,24,0.55);backdrop-filter:blur(4px)\" onclick=\"{{ closeBenefModal }}\">\n          <div style=\"background:#fff;border-radius:22px;padding:36px;width:520px;max-width:96vw;max-height:92vh;overflow-y:auto;box-shadow:0 24px 64px rgba(0,0,0,0.18)\" onclick=\"{{ stopPropagation }}\">\n            <div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:28px\">\n              <h2 style=\"font-size:20px;font-weight:900;color:#111C32\">{{ benefModalTitle }}<\u002Fh2>\n              <button onclick=\"{{ closeBenefModal }}\" style=\"background:#F0F2F7;border:none;border-radius:10px;width:36px;height:36px;cursor:pointer;font-size:18px;color:#6B7E9F\">✕<\u002Fbutton>\n            <\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;gap:16px\">\n              <div><label style=\"display:block;font-size:13px;font-weight:700;color:#111C32;margin-bottom:6px\">اسم الجهة / المستفيد *<\u002Flabel><input type=\"text\" value=\"{{ benefForm.name }}\" oninput=\"{{ onBenefName }}\" placeholder=\"اسم المسجد أو الجهة\" style=\"width:100%;padding:11px 14px;border:1.5px solid #D8DBE2;border-radius:10px;font-size:14px;outline:none\" style-focus=\"border-color:#4E5F80\"><\u002Fdiv>\n              <div><label style=\"display:block;font-size:13px;font-weight:700;color:#111C32;margin-bottom:6px\">النوع<\u002Flabel>\n                <select value=\"{{ benefForm.type }}\" onchange=\"{{ onBenefType }}\" style=\"width:100%;padding:11px 14px;border:1.5px solid #D8DBE2;border-radius:10px;font-size:14px;outline:none;cursor:pointer\" style-focus=\"border-color:#4E5F80\">\n                  <option>مسجد<\u002Foption><option>مدرسة<\u002Foption><option>جمعية خيرية<\u002Foption><option>فرد<\u002Foption><option>جهة حكومية<\u002Foption><option>أخرى<\u002Foption>\n                <\u002Fselect>\n              <\u002Fdiv>\n              <div><label style=\"display:block;font-size:13px;font-weight:700;color:#111C32;margin-bottom:6px\">رقم التواصل<\u002Flabel><input type=\"tel\" value=\"{{ benefForm.phone }}\" oninput=\"{{ onBenefPhone }}\" placeholder=\"+966 5XX XXX XXXX\" style=\"width:100%;padding:11px 14px;b     <div>\n                <h2 style=\"font-size:18px;font-weight:900;color:#111C32\">تسجيل شحنة جديدة<\u002Fh2>\n                <p style=\"font-size:12px;color:#6B7E9F;margin-top:3px\">أدخل بيانات الشحنة والتسليم<\u002Fp>\n              <\u002Fdiv>\n              <button onclick=\"{{ closeDistModal }}\" style=\"width:36px;height:36px;background:#F0F3F9;border:none;border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center\" style-hover=\"background:#FFE8E8\">\n                <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#6B7E9F\" stroke-width=\"2.5\"><line x1=\"18\" y1=\"6\" x2=\"6\" y2=\"18\"><\u002Fline><line x1=\"6\" y1=\"6\" x2=\"18\" y2=\"18\"><\u002Fline><\u002Fsvg>\n              <\u002Fbutton>\n            <\u002Fdiv>\n\n            <form style=\"display:flex;flex-direction:column;gap:18px\" onsubmit=\"{{ submitDist }}\">\n\n\n\n              <!-- Row 2: عدد المصاحف + عدد الكراتين + حجم المصحف -->\n              <div style=\"display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px\">\n                <div>\n                  <label style=\"display:block;font-size:12px;font-weight:700;color:#111C32;margin-bottom:7px\">عدد المصاحف <span style=\"color:#E05C5C\">*<\u002Fspan><\u002Flabel>\n                  <input type=\"number\" id=\"dist_count\" min=\"1\" placeholder=\"0\" required=\"\" style=\"width:100%;padding:11px 13px;border:1.5px solid #D8DBE2;border-radius:11px;font-size:14px;font-weight:700;color:#4E5F80;background:#F5F6F8;outline:none;direction:ltr;text-align:center\" style-focus=\"border-color:#4E5F80\">\n                <\u002Fdiv>\n                <div>\n                  <label style=\"display:block;font-size:12px;font-weight:700;color:#111C32;margin-bottom:7px\">عدد الكراتين<\u002Flabel>\n                  <input type=\"number\" id=\"dist_boxes\" min=\"0\" placeholder=\"0\" style=\"width:100%;padding:11px 13px;border:1.5px solid #D8DBE2;border-radius:11px;font-size:14px;font-weight:700;color:#111C32;background:#F5F6F8;outline:none;direction:ltr;text-align:center\" style-focus=\"border-color:#4E5F80\">\n                <\u002Fdiv>\n                <div>\n                  <label style=\"display:block;font-size:12px;font-weight:700;color:#111C32;margin-bottom:7px\">حجم المصحف<\u002Flabel>\n                  <select id=\"dist_size\" style=\"width:100%;padding:11px 13px;border:1.5px solid #D8DBE2;border-radius:11px;font-size:13px;color:#111C32;background:#F5F6F8;outline:none;cursor:pointer\" style-focus=\"border-color:#4E5F80\">\n                    <option value=\"\">اختر<\u002Foption>\n                    <option>كبير<\u002Foption>\n                    <option>وسط<\u002Foption>\n                    <option>صغير<\u002Foption>\n                  <\u002Fselect>\n                <\u002Fdiv>\n              <\u002Fdiv>\n\n\n\n              <!-- Row 4: الجهة المستفيدة + عنوانها -->\n              <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:16px\">\n                <div>\n                  <label style=\"display:block;font-size:12px;font-weight:700;color:#111C32;margin-bottom:7px\">الجهة المستفيدة <span style=\"color:#E05C5C\">*<\u002Fspan><\u002Flabel>\n                  <input type=\"text\" id=\"dist_beneficiary\" placeholder=\"اسم الجهة المستفيدة\" required=\"\" style=\"width:100%;padding:11px 13px;border:1.5px solid #D8DBE2;border-radius:11px;font-size:13px;color:#111C32;background:#F5F6F8;outline:none\" style-focus=\"border-color:#4E5F80\">\n                <\u002Fdiv>\n                <div>\n                  <label style=\"display:block;font-size:12px;font-weight:700;color:#111C32;margin-bottom:7px\">العنوان<\u002Flabel>\n                  <input type=\"text\" id=\"dist_address\" placeholder=\"المدينة / الحي / الشارع\" style=\"width:100%;padding:11px 13px;border:1.5px solid #D8DBE2;border-radius:11px;font-size:13px;color:#111C32;background:#F5F6F8;outline:none\" style-focus=\"border-color:#4E5F80\">\n                <\u002Fdiv>\n
